services:
  kafka:
    image: confluentinc/cp-kafka:latest
    container_name: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
      # We define TWO listeners: INTERNAL for other containers, EXTERNAL for your Python scripts
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:29092,EXTERNAL://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:29092,EXTERNAL://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk

  postgres:
    image: postgres:15.17
    container_name: logistics_db
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: logistics_reports
    ports:
      - "5432:5432"
    volumes:
      - ./postgres-init:/docker-entrypoint-initdb.d

  producer:
    build: .
    container_name: producer
    command: python src/producer/producer.py
    environment:
      KAFKA_BROKER: "kafka:29092"
    depends_on:
      - kafka

  consumer:
    build: .
    container_name: consumer
    command: python src/consumer/consumer.py
    environment:
      KAFKA_BROKER: "kafka:29092"
      POSTGRES_HOST: "postgres"
      POSTGRES_DB: "logistics_reports"
      POSTGRES_USER: "admin"
      POSTGRES_PASSWORD: "password123"
      CONSUMER_HEALTH_PORT: "8080"
    ports:
      - "8080:8080"
    depends_on:
      - kafka
      - postgres
    # Optional: bind-mount a local secrets file into the container. Create
    # a file at ./secrets/openweather_api_key containing only your API key
    # (and add ./secrets to .gitignore). Uncomment the following lines to enable:
    # volumes:
    #   - ./secrets/openweather_api_key:/run/secrets/openweather_api_key:ro

  kafdrop:
    image: obsidiandynamics/kafdrop:latest
    ports:
      - "9000:9000"
    environment:
      KAFKA_BROKERCONNECT: "kafka:29092"
    depends_on:
      - kafka
